{% extends 'base.html' %}

{% block content %}
  <div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-lg shadow-lg">
    <div class="text-center mb-8">
      <div class="bg-green-100 text-green-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
        <i class="fas fa-store"></i>
      </div>
      <h2 class="text-2xl font-bold">Setup Your Restaurant</h2>
      <p class="text-gray-500">Tell us about your business to get started.</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block font-bold text-gray-700">Restaurant Name</label>
        {{ form.name }}
      </div>

      <div>
        <label class="block font-bold text-gray-700">Address</label>
        {{ form.address }}
      </div>

      <div>
        <label class="block font-bold text-gray-700">Logo</label>
        {{ form.logo }}
      </div>

      <div class="hidden">{{ form.is_active }}</div>

      <div class="hidden">{{ form.owner }}</div>

      <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 text-lg shadow">Launch Dashboard 🚀</button>
    </form>
  </div>
{% endblock %}
