{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">🪑 Registered Tables</h1>
        <a href="{% url 'super_restaurant_detail' restaurant.pk %}" class="bg-gray-200 px-4 py-2 rounded">Back</a>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
        {% for table in tables %}
        <div class="bg-white p-4 rounded-lg shadow text-center border">
            <h3 class="font-bold text-xl mb-2 text-gray-800">Table {{ table.table_number }}</h3>
            <p class="text-xs text-gray-400 break-all mb-2">{{ table.unique_id }}</p>
            
            {% if table.qr_code %}
                <img src="{{ table.qr_code.url }}" class="w-full h-auto mb-3 border">
                <a href="{{ table.qr_code.url }}" download class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded hover:bg-blue-200">
                   Download QR
                </a>
            {% else %}
                <p class="text-red-500">QR Error</p>
            {% endif %}
        </div>
        {% empty %}
        <p class="col-span-full text-center text-gray-500">No tables found.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
