<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SaaS POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body class="bg-gray-100 h-screen flex justify-center items-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
      <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-orange-600"><i class="fas fa-utensils mr-2"></i>SaaS POS</h1>
        <p class="text-gray-500">Sign in to your dashboard</p>
      </div>

      <form method="post" class="space-y-4">
        {% csrf_token %}

        {% if form.errors %}
          <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">
            <p class="text-sm">Invalid username or password.</p>
          </div>
        {% endif %}

        <div>
          <label class="block text-gray-700 font-bold mb-2">Username</label>
          <input type="text" name="username" class="w-full p-2 border rounded focus:outline-none focus:border-orange-500" placeholder="Enter username" required />
        </div>

        <div>
          <label class="block text-gray-700 font-bold mb-2">Password</label>
          <input type="password" name="password" class="w-full p-2 border rounded focus:outline-none focus:border-orange-500" placeholder="Enter password" required />

          <div class="flex justify-end mt-1">
            <a href="{% url 'password_reset' %}" class="text-xs text-orange-600 hover:text-orange-800 hover:underline">Forgot Password?</a>
          </div>
        </div>

        <button type="submit" class="w-full bg-orange-600 text-white py-2 rounded font-bold hover:bg-orange-700 transition duration-200 shadow-md">Login</button>
      </form>

      <div class="mt-6 text-center text-sm border-t pt-4">
        <p class="text-gray-600">Don't have an account?</p>
        <a href="{% url 'signup' %}" class="text-blue-600 font-bold hover:underline hover:text-blue-800">Register New Restaurant</a>
      </div>
    </div>
  </body>
</html>
